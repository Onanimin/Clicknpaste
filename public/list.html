<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>All pastes</title>
  <style>
    body{font-family:Inter,system-ui;padding:20px;background:#0b0b0b;color:#fff}
    a{color:#ffb14d}
    .card{padding:14px;border-radius:8px;background:#111;margin-bottom:12px;border:1px solid rgba(255,177,77,0.06)}
    .locked{display:inline-flex;align-items:center;gap:6px;margin-left:8px;padding:4px 10px;border-radius:999px;background:rgba(255,177,77,0.2);border:1px solid rgba(255,177,77,0.35);font-size:0.78rem;color:#ffd199;font-weight:700;letter-spacing:0.03em;text-transform:uppercase}
    .hint{color:#ffd199;font-size:0.92rem;margin-top:6px}
    .card.locked-card{border-color:rgba(255,177,77,0.35);background:linear-gradient(180deg,rgba(255,177,77,0.08),rgba(17,17,17,0.96))}
  </style>
</head>
<body>
  <h1>Available pastes</h1>
  <div id="list">Loading…</div>
  <script>
    async function load(){
      const r = await fetch('/api/pastes', { cache: 'no-store' });
      const json = await r.json();
      const el = document.getElementById('list');
      if(!json.length){ el.innerHTML = '<p>No pastes found.</p>'; return; }
      el.innerHTML = json.map(function(p){
        var locked = p.private ? '<span class="locked">🔒 Private</span>' : '';
        var hint = p.private ? '<div class="hint">Click to open, then enter the password.</div>' : '';
        return '<div class="card '+(p.private ? 'locked-card' : '')+'"><a href="/p/'+p.id+'">/p/'+p.id+'</a>'+locked+'<div>Created: '+(p.created_at||'unknown')+'</div><div>Remaining views: '+(p.remaining_views===null?'Unlimited':p.remaining_views)+'</div>'+hint+'</div>';
      }).join('');
    }
    load();
  </script>
</body>
</html>
